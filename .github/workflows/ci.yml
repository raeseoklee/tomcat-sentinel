name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Test, Build, And Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build And Package Linux archives
        run: make package-linux VERSION=${{ github.sha }}

      - name: Docker live smoke
        run: scripts/docker-live-smoke.sh

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v7
        with:
          name: tomcat-sentinel-linux
          path: |
            dist/tomcat-sentinel-linux-amd64
            dist/tomcat-sentinel-linux-arm64
            dist/tomcat-sentinel-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
